# Редирект с www на без www
server {
    listen 80;
    listen 443 ssl;
    server_name www.family-planner.ru;

    ssl_certificate /etc/letsencrypt/live/family-planner.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/family-planner.ru/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/html/certbot;
    }

    location / {
        return 301 https://family-planner.ru$request_uri;
    }
}

# Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name family-planner.ru;

	location /.well-known/acme-challenge/ {
        root /var/html/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_tokens off;
    listen 443 ssl;
    server_name family-planner.ru;

    ssl_certificate /etc/letsencrypt/live/family-planner.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/family-planner.ru/privkey.pem;

    client_max_body_size 5M;

    location ~ ^/\.well-known/assetlinks\.json$ {
        alias /var/html/assetlinks.json;
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
}

    # Отдельно обрабатываем запросы со слешом - редирект
    location = /.well-known/assetlinks.json/ {
        return 301 /.well-known/assetlinks.json;
    }

    location /static/ {
        root /var/html/;
    }

    location /media/ {
        root /var/html/;
    }

    location / {
        proxy_pass              http://planner-back:8000/;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }
}

# Портейнер
server {
      listen 80;
      server_name portainer.family-planner.ru;

      location /.well-known/acme-challenge/ {
          root /var/html/certbot;
      }

      location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_tokens off;
    listen 443 ssl;
    server_name portainer.family-planner.ru;

    ssl_certificate /etc/letsencrypt/live/portainer.family-planner.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portainer.family-planner.ru/privkey.pem;

    location / {
        proxy_pass http://portainer:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

