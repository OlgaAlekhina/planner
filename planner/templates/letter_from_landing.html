<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Обращение с сайта family-planner.ru</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #f4f4f4; padding: 10px; border-radius: 5px; }
        .message { background: #f9f9f9; padding: 15px; margin: 30px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Новое обращение с сайта family-planner.ru</h2>
        <div class="header">
            <p><strong>Имя:</strong> {{ data.name }}</p>
        </div>
        <br>
        <div class="message">
            <strong>Сообщение:</strong>
            <p>{{ data.text }}</p>
        </div>
    </div>
</body>
</html>
